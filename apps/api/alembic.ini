# Alembic 配置。
# 数据库 URL 不在此硬编码——由 migrations/env.py 从 app.core.settings 读取，
# 与应用使用同一配置来源（.env / 环境变量），避免双份真相。

[alembic]
script_location = migrations
prepend_sys_path = .
# 版本文件名带时间戳前缀，便于按时间排序浏览
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
